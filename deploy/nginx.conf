# Pre-SSL config (HTTP only — used during initial certbot setup)
server {
    listen 80;
    server_name amsirartrip.com www.amsirartrip.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After SSL is obtained, this redirects to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Full HTTPS config (enabled after certbot issues certificate)
server {
    listen 443 ssl http2;
    server_name amsirartrip.com www.amsirartrip.com;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/amsirartrip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amsirartrip.com/privkey.pem;

    # Modern SSL config (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Rate limiting zone (define in http block of /etc/nginx/nginx.conf)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ─── Static assets (long cache) ────────────────────────
    location /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /fonts/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:4321;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /robots.txt {
        proxy_pass http://127.0.0.1:4321;
    }

    location /sitemap.xml {
        proxy_pass http://127.0.0.1:4321;
    }

    # ─── API routes (rate limited) ─────────────────────────
    location /api/ {
        # Uncomment after adding limit_req_zone to nginx.conf http block:
        # limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ─── Everything else → Astro SSR ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }
}
