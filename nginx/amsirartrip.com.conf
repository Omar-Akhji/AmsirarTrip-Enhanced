server {
    listen 80;
    server_name amsirartrip.com www.amsirartrip.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name amsirartrip.com www.amsirartrip.com;

    ssl_certificate /etc/letsencrypt/live/amsirartrip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amsirartrip.com/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Static assets — long cache
    location /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Astro SSR
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
